<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Talks With Toqqx — Under Construction</title>
<meta name="description" content="Plugging the last few leaks before we invite everyone onto the boat." />
<style>
  :root {
    --bg: #1a181e;
    --bg-deep: #0d0a14;
    --border: #2e2a3a;
    --glow: #c9b4ea;
    --fg: #e7e2eb;
    --muted: #9a999e;
    --gradient-accent: linear-gradient(135deg, #543487, #c9b4ea);
  }
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    background: var(--bg-deep);
    color: var(--fg);
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 40px 24px;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
  }
  /* Decorative glow background blobs */
  .glow-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    pointer-events: none;
    z-index: 1;
    opacity: 0.25;
  }
  .glow-1 {
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, var(--glow), transparent 70%);
    top: -100px;
    left: -100px;
  }
  .glow-2 {
    width: 450px;
    height: 450px;
    background: radial-gradient(circle, #543487, transparent 70%);
    bottom: -150px;
    right: -150px;
  }
  .container {
    position: relative;
    z-index: 10;
    max-width: 950px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 32px;
  }
  .image-wrapper {
    width: 100%;
    max-width: 950px;
    border-radius: 24px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: rgba(42, 36, 53, 0.4);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 40px rgba(135, 84, 219, 0.2);
    aspect-ratio: 16/10;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.6s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .image-wrapper:hover {
    transform: translateY(-6px) scale(1.005);
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 50px rgba(135, 84, 219, 0.35);
    border-color: rgba(201, 180, 234, 0.4);
  }
  .plug-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .image-wrapper:hover .plug-img {
    transform: scale(1.025);
  }
  .message {
    font-size: clamp(20px, 3.5vw, 28px);
    font-weight: 700;
    line-height: 1.45;
    color: var(--fg);
    max-width: 700px;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #ffffff 40%, #c9b4ea 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.7)) drop-shadow(0 2px 6px rgba(135, 84, 219, 0.35));
    margin-top: 8px;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .message:hover {
    transform: scale(1.02);
  }
</style>
</head>
<body>
  <div class="glow-blob glow-1"></div>
  <div class="glow-blob glow-2"></div>
  <div class="container">
    <div class="image-wrapper">
      <img src="img/plug.png" alt="Under Construction" class="plug-img" />
    </div>
    <p class="message">
      "Plugging the last few leaks before we invite everyone onto the boat."
    </p>
  </div>
</body>
</html>
